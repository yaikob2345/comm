<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P2P Group Connect (Admin Approved)</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: #fff; margin: 0; padding: 10px; box-sizing: border-box; }
        .screen { display: none; flex-direction: column; height: 95vh; }
        .active { display: flex; }
        
        /* Setup Screen */
        #setup { justify-content: center; align-items: center; gap: 15px; text-align: center; }
        input, button { padding: 12px; font-size: 16px; border-radius: 8px; border: none; width: 85%; max-width: 300px; }
        input { background: #333; color: #fff; border: 1px solid #555; }
        button { background: #007bff; color: #fff; cursor: pointer; font-weight: bold; }
        button:active { background: #0056b3; }
        .admin-id { background: #28a745; padding: 10px; border-radius: 8px; font-size: 18px; word-break: break-all; width: 85%; max-width: 300px;}
        .status-text { font-size: 14px; min-height: 20px; font-weight: bold;}
        
        /* Main App Screen */
        #app { gap: 10px; }
        #header { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 10px; border-radius: 8px;}
        
        /* Pending Requests Box (Admin Only) */
        #pending-box { background: #442200; border: 1px solid #ff9800; padding: 10px; border-radius: 8px; display: none; }
        .req-item { display: flex; justify-content: space-between; align-items: center; background: #333; padding: 8px; border-radius: 5px; margin-top: 8px; }
        .btn-approve { background: #28a745; padding: 6px 14px; border-radius: 4px; color: #fff; border: none; cursor: pointer; font-weight: bold;}
        .btn-reject { background: #dc3545; padding: 6px 14px; border-radius: 4px; color: #fff; border: none; cursor: pointer; font-weight: bold; margin-left: 5px;}

        #videos { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; max-height: 35vh; overflow-y: auto; background: #000; padding: 10px; border-radius: 8px;}
        video { width: 100%; border-radius: 8px; background: #333; object-fit: cover; aspect-ratio: 4/3;}
        
        #chat-box { flex: 1; background: #1e1e1e; padding: 10px; border-radius: 8px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 8px; border-radius: 8px; max-width: 85%; word-wrap: break-word; font-size: 14px;}
        .msg-text { background: #333; align-self: flex-start; }
        .msg-mine { background: #007bff; align-self: flex-end; }
        .msg-system { background: #555; align-self: center; font-style: italic; font-size: 12px;}
        .msg img { max-width: 100%; border-radius: 8px; margin-top: 5px; }
        
        #controls { display: flex; gap: 5px; flex-wrap: wrap; }
        #controls input[type="text"] { flex: 2; min-width: 120px; }
        #controls button, #controls label { flex: 1; padding: 10px; text-align: center; background: #444; cursor: pointer; font-size: 14px; min-width: 60px;}
        #controls input[type="file"] { display: none; }
        .btn-media { background: #dc3545 !important; }
        .btn-media.active { background: #28a745 !important; }
    </style>
</head>
<body>

    <!-- SETUP SCREEN -->
    <div id="setup" class="screen active">
        <h2>P2P Group Connect</h2>
        <input type="text" id="name" placeholder="Enter your name">
        
        <div id="admin-section">
            <button onclick="createRoom()">Create Room (Admin)</button>
            <div id="room-id-display" class="admin-id" style="display:none;"></div>
        </div>

        <hr style="width: 85%; border-color: #333;">

        <div id="join-section">
            <input type="text" id="join-id" placeholder="Enter Admin's Room ID">
            <button onclick="joinRoom()">Request to Join (Friend)</button>
        </div>
        <p id="status" class="status-text"></p>
    </div>

    <!-- MAIN APP SCREEN -->
    <div id="app" class="screen">
        <div id="header">
            <span id="user-info"></span>
            <span id="room-info" style="font-size: 12px; color: #aaa;"></span>
        </div>
        
        <!-- Admin sees pending requests here -->
        <div id="pending-box">
            <b style="color: #ff9800;">⚠️ Pending Requests:</b>
            <div id="requests-list"></div>
        </div>
        
        <div id="videos"></div>
        <div id="chat-box"></div>
        
        <div id="controls">
            <input type="text" id="msg-input" placeholder="Type a message...">
            <button onclick="sendText()">Send</button>
            <label for="photo-input">📷</label>
            <input type="file" id="photo-input" accept="image/*" onchange="sendPhoto(event)">
            <button id="btn-cam" class="btn-media" onclick="toggleMedia('video')">Cam</button>
            <button id="btn-mic" class="btn-media" onclick="toggleMedia('audio')">Mic</button>
        </div>
    </div>

    <script>
        let peer;
        let localStream;
        let connections = []; // Admin stores approved friends here
        let adminConn = null; // Friend stores admin connection here
        let myName = "";
        let isAdmin = false;
        let roomId = "";
        let mediaEnabled = { video: true, audio: true };

        // --- UI HELPERS ---
        function showStatus(msg, isError = true) {
            const el = document.getElementById('status');
            el.innerText = msg;
            el.style.color = isError ? '#ff5555' : '#55ff55';
        }

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function addMessage(sender, text, type = 'text') {
            const chatBox = document.getElementById('chat-box');
            const div = document.createElement('div');
            if (type === 'system') {
                div.className = 'msg msg-system';
                div.innerText = text;
            } else {
                const isMine = sender === myName;
                div.className = `msg ${isMine ? 'msg-mine' : 'msg-text'}`;
                div.innerHTML = `<b>${sender}:</b><br>${type === 'photo' ? `<img src="${text}" alt="photo">` : text}`;
            }
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function addVideoStream(stream, id, name) {
            const videosDiv = document.getElementById('videos');
            if (document.getElementById('vid-' + id)) return; 
            const video = document.createElement('video');
            video.id = 'vid-' + id;
            video.srcObject = stream;
            video.autoplay = true;
            video.playsInline = true;
            video.muted = (id === 'local'); 
            
            const container = document.createElement('div');
            container.style.position = 'relative';
            container.appendChild(video);
            const label = document.createElement('span');
            label.innerText = name;
            label.style.position = 'absolute';
            label.style.bottom = '5px';
            label.style.left = '5px';
            label.style.background = 'rgba(0,0,0,0.7)';
            label.style.padding = '2px 6px';
            label.style.borderRadius = '4px';
            label.style.fontSize = '12px';
            container.appendChild(label);
            videosDiv.appendChild(container);
        }

        // --- ADMIN: HANDLE JOIN REQUESTS ---
        function showRequest(conn, name) {
            const pendingBox = document.getElementById('pending-box');
            pendingBox.style.display = 'block';
            
            const reqDiv = document.createElement('div');
            reqDiv.className = 'req-item';
            reqDiv.innerHTML = `<span>${name} wants to join</span>`;
            
            const btnApprove = document.createElement('button');
            btnApprove.innerText = '✓ Approve';
            btnApprove.className = 'btn-approve';
            btnApprove.onclick = () => {
                conn.send({ type: 'join_approved' });
                connections.push(conn); // Add to active chat
                addMessage('System', `${name} joined the chat!`, 'system');
                reqDiv.remove();
                checkPendingBox();
            };
            
            const btnReject = document.createElement('button');
            btnReject.innerText = '✗ Reject';
            btnReject.className = 'btn-reject';
            btnReject.onclick = () => {
                conn.send({ type: 'join_rejected' });
                conn.close();
                reqDiv.remove();
                checkPendingBox();
            };
            
            reqDiv.appendChild(btnApprove);
            reqDiv.appendChild(btnReject);
            document.getElementById('requests-list').appendChild(reqDiv);
        }

        function checkPendingBox() {
            if (document.getElementById('requests-list').children.length === 0) {
                document.getElementById('pending-box').style.display = 'none';
            }
        }

        // --- CORE LOGIC ---
        async function initMedia() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                addVideoStream(localStream, 'local', myName);
                updateMediaButtons();
            } catch (err) {
                alert("Camera/Mic permission denied. Please allow access.");
            }
        }

        function handleMediaCall(call) {
            call.answer(localStream);
            call.on('stream', (remoteStream) => {
                addVideoStream(remoteStream, call.peer, call.metadata?.name || 'User');
            });
        }

        // --- ADMIN FUNCTIONS ---
        function createRoom() {
            myName = document.getElementById('name').value.trim() || 'Admin';
            roomId = 'room-' + Math.random().toString(36).substr(2, 6);
            isAdmin = true;

            showStatus('Creating room...', false);
            peer = new Peer(roomId);
            
            peer.on('open', () => {
                document.getElementById('room-id-display').style.display = 'block';
                document.getElementById('room-id-display').innerText = 'Share ID: ' + roomId;
                showStatus('Room created! Waiting for requests...', false);
                switchScreen('app');
                document.getElementById('user-info').innerText = myName + ' (Admin)';
                document.getElementById('room-info').innerText = 'ID: ' + roomId;
                initMedia();
            });

            // Listen for incoming connection requests
            peer.on('connection', (conn) => {
                conn.on('data', (data) => {
                    if (data.type === 'join_request') {
                        showRequest(conn, data.sender);
                    } else if (connections.includes(conn)) {
                        // Only process chat data if they are approved
                        if (data.type === 'text') addMessage(data.sender, data.msg, 'text');
                        if (data.type === 'photo') addMessage(data.sender, data.data, 'photo');
                    }
                });
                conn.on('close', () => {
                    connections = connections.filter(c => c !== conn);
                    addMessage('System', `${conn.metadata?.name || 'User'} disconnected.`, 'system');
                });
            });

            peer.on('call', (call) => handleMediaCall(call));
            peer.on('error', (err) => showStatus('Admin Error: ' + err.type));
        }

        // --- FRIEND FUNCTIONS ---
        function joinRoom() {
            myName = document.getElementById('name').value.trim() || 'Friend';
            roomId = document.getElementById('join-id').value.trim();
            if (!roomId) return showStatus('Please enter the Room ID.');
            isAdmin = false;

            showStatus('Connecting and requesting to join...', false);
            peer = new Peer(); 

            peer.on('open', () => {
                const conn = peer.connect(roomId, { reliable: true, metadata: { name: myName } });
                
                conn.on('open', () => {
                    conn.send({ type: 'join_request', sender: myName });
                    showStatus('Waiting for Admin approval...', false);
                });
                
                // Listen for Admin's decision
                conn.on('data', (data) => {
                    if (data.type === 'join_approved') {
                        showStatus('Approved! Entering room...', false);
                        adminConn = conn;
                        
                        // Now setup active chat listening
                        conn.on('data', (chatData) => {
                            if (chatData.type === 'text') addMessage(chatData.sender, chatData.msg, 'text');
                            if (chatData.type === 'photo') addMessage(chatData.sender, chatData.data, 'photo');
                            if (chatData.type === 'system') addMessage('System', chatData.text, 'system');
                        });

                        initMedia().then(() => {
                            const call = peer.call(roomId, localStream, { metadata: { name: myName } });
                            call.on('stream', (remoteStream) => addVideoStream(remoteStream, roomId, 'Admin'));
                        });

                        switchScreen('app');
                        document.getElementById('user-info').innerText = myName + ' (Friend)';
                        document.getElementById('room-info').innerText = 'Room: ' + roomId;
                    } 
                    else if (data.type === 'join_rejected') {
                        showStatus('Admin rejected your request.', true);
                        conn.close();
                    }
                });
                
                conn.on('error', () => showStatus('Failed! Wrong ID or Admin offline.', true));
                conn.on('close', () => {
                    if (!document.getElementById('app').classList.contains('active')) {
                        showStatus('Failed! Wrong ID or Admin offline.', true);
                    }
                });
            });
            peer.on('error', () => showStatus('Connection failed. Check ID.', true));
        }

        // --- SENDING DATA ---
        function sendData(data) {
            if (data.type === 'text') addMessage(data.sender, data.msg, 'text');
            if (data.type === 'photo') addMessage(data.sender, data.data, 'photo');

            if (isAdmin) {
                connections.forEach(conn => { if(conn.open) conn.send(data); });
            } else {
                if (adminConn && adminConn.open) adminConn.send(data);
            }
        }

        function sendText() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text) return;
            sendData({ type: 'text', sender: myName, msg: text });
            input.value = '';
        }

        function sendPhoto(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width, height = img.height;
                    if (width > 800) { height *= 800 / width; width = 800; }
                    canvas.width = width; canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    sendData({ type: 'photo', sender: myName, data: canvas.toDataURL('image/jpeg', 0.6) });
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
            event.target.value = ''; 
        }

        // --- MEDIA CONTROLS ---
        function toggleMedia(type) {
            if (!localStream) return;
            const track = type === 'video' ? localStream.getVideoTracks()[0] : localStream.getAudioTracks()[0];
            if (track) {
                track.enabled = !track.enabled;
                mediaEnabled[type] = track.enabled;
                updateMediaButtons();
            }
        }

        function updateMediaButtons() {
            document.getElementById('btn-cam').classList.toggle('active', mediaEnabled.video);
            document.getElementById('btn-mic').classList.toggle('active', mediaEnabled.audio);
        }

        document.getElementById('msg-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendText();
        });
    </script>
</body>
</html>
